repos:
  - repo: local
    hooks:
      - id: shopflow-verify-local-hygiene
        name: shopflow verify local hygiene
        entry: pnpm verify:local-hygiene
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
      - id: shopflow-commitlint
        name: shopflow commitlint
        entry: pnpm exec commitlint --edit
        language: system
        pass_filenames: true
        always_run: true
        stages: [commit-msg]
      - id: shopflow-verify-pre-push
        name: shopflow verify pre push
        entry: pnpm verify:pre-push
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
