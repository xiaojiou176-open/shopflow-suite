<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="880" viewBox="0 0 1440 880" role="img" aria-labelledby="title desc">
  <title id="title">Shopflow front door</title>
  <desc id="desc">A storefront-style hero showing Shopflow as one canonical shopping extension family with eight storefront apps, one Suite shell, a review shelf, and a read-only stdio MCP desk.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8efe4" />
      <stop offset="45%" stop-color="#fff8ef" />
      <stop offset="100%" stop-color="#eef7f6" />
    </linearGradient>
    <linearGradient id="navyCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#17324d" />
      <stop offset="100%" stop-color="#0b1828" />
    </linearGradient>
    <linearGradient id="mintCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d9f6ef" />
      <stop offset="100%" stop-color="#bfe9dd" />
    </linearGradient>
    <linearGradient id="amberCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe1b0" />
      <stop offset="100%" stop-color="#ffc975" />
    </linearGradient>
  </defs>

  <rect width="1440" height="880" rx="36" fill="url(#bg)" />
  <rect x="48" y="48" width="1344" height="784" rx="34" fill="#fffdf9" stroke="#eddcc7" stroke-width="2" />

  <text x="112" y="142" fill="#14304c" font-size="68" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Shopflow</text>
  <text x="112" y="194" fill="#38566b" font-size="28" font-family="'Trebuchet MS', 'Segoe UI', sans-serif">Chrome-first shopping extension family with one canonical repo, one review shelf, and one truthful MCP desk.</text>

  <rect x="112" y="236" width="610" height="246" rx="30" fill="url(#navyCard)" />
  <text x="156" y="304" fill="#f9fbfb" font-size="36" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-weight="700">What a visitor sees first</text>
  <text x="156" y="358" fill="#d6e5ef" font-size="25" font-family="'Trebuchet MS', 'Segoe UI', sans-serif">8 storefront apps + 1 Suite shell</text>
  <text x="156" y="398" fill="#d6e5ef" font-size="25" font-family="'Trebuchet MS', 'Segoe UI', sans-serif">real review bundles and submission-readiness materials</text>
  <text x="156" y="438" fill="#d6e5ef" font-size="25" font-family="'Trebuchet MS', 'Segoe UI', sans-serif">repo-local read-only stdio MCP, not a fake hosted API</text>

  <rect x="760" y="236" width="568" height="246" rx="30" fill="#fffaf2" stroke="#ecd6a9" stroke-width="2" />
  <text x="804" y="304" fill="#7a4513" font-size="34" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-weight="700">Current claim boundary</text>
  <text x="804" y="358" fill="#6b4e2f" font-size="24" font-family="'Trebuchet MS', 'Segoe UI', sans-serif">Pages, release, and reviewer shelf are live.</text>
  <text x="804" y="394" fill="#6b4e2f" font-size="24" font-family="'Trebuchet MS', 'Segoe UI', sans-serif">Signed/store-ready artifacts still are not.</text>
  <text x="804" y="430" fill="#6b4e2f" font-size="24" font-family="'Trebuchet MS', 'Segoe UI', sans-serif">Chrome Web Store claims stay gated until that changes.</text>

  <rect x="112" y="534" width="250" height="188" rx="28" fill="url(#mintCard)" />
  <text x="144" y="590" fill="#153c3a" font-size="32" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-weight="700">8 storefronts</text>
  <text x="144" y="632" fill="#285957" font-size="22" font-family="'Trebuchet MS', 'Segoe UI', sans-serif">Albertsons</text>
  <text x="144" y="662" fill="#285957" font-size="22" font-family="'Trebuchet MS', 'Segoe UI', sans-serif">Amazon • Costco • Kroger</text>
  <text x="144" y="692" fill="#285957" font-size="22" font-family="'Trebuchet MS', 'Segoe UI', sans-serif">Target • Temu • Walmart • Weee</text>

  <rect x="396" y="534" width="250" height="188" rx="28" fill="#e2eefb" />
  <text x="428" y="590" fill="#1b416f" font-size="32" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-weight="700">1 Suite shell</text>
  <text x="428" y="632" fill="#30557e" font-size="22" font-family="'Trebuchet MS', 'Segoe UI', sans-serif">internal-alpha lobby</text>
  <text x="428" y="662" fill="#30557e" font-size="22" font-family="'Trebuchet MS', 'Segoe UI', sans-serif">readiness + routing</text>
  <text x="428" y="692" fill="#30557e" font-size="22" font-family="'Trebuchet MS', 'Segoe UI', sans-serif">evidence visibility</text>

  <rect x="680" y="534" width="292" height="188" rx="28" fill="#ebf6e6" />
  <text x="712" y="590" fill="#24522f" font-size="32" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-weight="700">Read-only MCP</text>
  <text x="712" y="632" fill="#3d6a49" font-size="22" font-family="'Trebuchet MS', 'Segoe UI', sans-serif">integration surface</text>
  <text x="712" y="662" fill="#3d6a49" font-size="22" font-family="'Trebuchet MS', 'Segoe UI', sans-serif">runtime seam</text>
  <text x="712" y="692" fill="#3d6a49" font-size="22" font-family="'Trebuchet MS', 'Segoe UI', sans-serif">submission + distribution truth</text>

  <rect x="1006" y="534" width="322" height="188" rx="28" fill="url(#amberCard)" />
  <text x="1038" y="590" fill="#6f3a10" font-size="32" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-weight="700">One canonical front door</text>
  <text x="1038" y="632" fill="#7a4c1a" font-size="22" font-family="'Trebuchet MS', 'Segoe UI', sans-serif">xiaojiou176-open/shopflow-suite</text>
  <text x="1038" y="662" fill="#7a4c1a" font-size="22" font-family="'Trebuchet MS', 'Segoe UI', sans-serif">Pages + release + docs + MCP</text>
  <text x="1038" y="692" fill="#7a4c1a" font-size="22" font-family="'Trebuchet MS', 'Segoe UI', sans-serif">no fake second storefront</text>

  <text x="112" y="784" fill="#536772" font-size="22" font-family="'Trebuchet MS', 'Segoe UI', sans-serif">Builder-facing packets are real, but secondary. Product story stays storefront-first.</text>
</svg>
