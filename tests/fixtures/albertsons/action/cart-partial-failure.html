<!doctype html>
<html lang="en">
  <body>
    <main data-shopflow-cart-page="true">
      <section data-shopflow-subscribe-item data-item-ref="cart-item-1">
        <p>Safeway Organic Yogurt</p>
        <button
          aria-label="schedule and save"
          data-shopflow-schedule-save-trigger
        >
          Schedule &amp; Save
        </button>
        <button data-shopflow-schedule-save-option="16 weeks">16 weeks</button>
        <button data-shopflow-schedule-save-confirm>Subscribe</button>
      </section>
      <section data-shopflow-subscribe-item data-item-ref="cart-item-2">
        <p>Safeway Granola Bars</p>
        <button
          aria-label="schedule and save"
          data-shopflow-schedule-save-trigger
        >
          Schedule &amp; Save
        </button>
        <button data-shopflow-schedule-save-option="16 weeks">16 weeks</button>
      </section>
    </main>
  </body>
</html>
