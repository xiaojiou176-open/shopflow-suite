<!doctype html>
<html lang="en">
  <head>
    <title>Costco Search Card Image Variant</title>
  </head>
  <body>
    <main data-page-kind="search">
      <article data-shopflow-search-item>
        <a
          data-shopflow-search-url
          href="https://www.costco.com/kirkland-storage-tote.product.400501.html"
        >
          <span data-shopflow-search-title>Kirkland Storage Tote</span>
        </a>
        <img
          loading="lazy"
          data-srcset="/images/storage-tote@2x.jpg 2x, /images/storage-tote.jpg 1x"
          alt="Kirkland Storage Tote"
        />
        <span data-shopflow-search-price>$14.99</span>
      </article>
      <article data-shopflow-search-item>
        <a
          data-shopflow-search-url
          href="https://www.costco.com/kitchen-pantry-canisters.product.400502.html"
        >
          <span data-shopflow-search-title>Kitchen Pantry Canisters</span>
        </a>
        <img
          loading="lazy"
          data-src="https://www.costco.com/images/kitchen-pantry-canisters.jpg"
          alt="Kitchen Pantry Canisters"
        />
        <span data-shopflow-search-price>$22.49</span>
      </article>
    </main>
  </body>
</html>
