<!doctype html>
<html lang="en">
  <head>
    <title>Costco Search Fixture</title>
  </head>
  <body>
    <main data-page-kind="search">
      <article data-shopflow-search-item>
        <a
          data-shopflow-search-url
          href="https://www.costco.com/kirkland-cold-brew.product.400001.html"
        >
          <span data-shopflow-search-title>Kirkland Signature Cold Brew</span>
        </a>
        <span data-shopflow-search-price>$15.99</span>
      </article>
      <article data-shopflow-search-item>
        <a
          data-shopflow-search-url
          href="https://www.costco.com/organic-cashews.product.400002.html"
        >
          <span data-shopflow-search-title>Organic Cashews</span>
        </a>
        <span data-shopflow-search-price>$11.49</span>
      </article>
    </main>
  </body>
</html>
