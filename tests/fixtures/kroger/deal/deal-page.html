<!doctype html>
<html lang="en">
  <head>
    <title>Kroger Family Deal Fixture</title>
  </head>
  <body>
    <main data-page-kind="deal">
      <article data-shopflow-deal-item>
        <a
          data-shopflow-deal-url
          href="https://www.fredmeyer.com/deals/family-berries"
        >
          <span data-shopflow-deal-title>Fred Meyer Blueberries</span>
        </a>
        <span data-shopflow-deal-label>Digital coupon</span>
        <span data-shopflow-deal-price>$2.99</span>
      </article>
      <article data-shopflow-deal-item>
        <a
          data-shopflow-deal-url
          href="https://www.qfc.com/deals/family-yogurt"
        >
          <span data-shopflow-deal-title>QFC Greek Yogurt</span>
        </a>
        <span data-shopflow-deal-label>Weekly deal</span>
        <span data-shopflow-deal-price>$3.49</span>
      </article>
    </main>
  </body>
</html>
