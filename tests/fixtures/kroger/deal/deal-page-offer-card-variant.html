<!doctype html>
<html lang="en">
  <head>
    <title>Kroger Family Offer Card Variant Fixture</title>
  </head>
  <body>
    <main data-page-kind="deal">
      <article data-testid="offer-card">
        <a
          data-testid="offer-link"
          href="https://www.fredmeyer.com/deals/oat-milk"
        >
          <span data-testid="offer-title">Fred Meyer Oat Milk</span>
        </a>
        <span data-testid="offer-badge">Member exclusive</span>
        <span data-testid="offer-price">$3.79</span>
      </article>
      <article data-testid="offer-card">
        <a
          data-testid="offer-link"
          href="https://www.qfc.com/deals/pasta-sauce"
        >
          <span data-testid="offer-title">QFC Pasta Sauce</span>
        </a>
        <span data-testid="offer-badge">Clip coupon</span>
        <span data-testid="offer-price">$2.99</span>
      </article>
    </main>
  </body>
</html>
