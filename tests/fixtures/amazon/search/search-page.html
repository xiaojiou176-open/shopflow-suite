<!doctype html>
<html lang="en">
  <head>
    <title>Amazon Search Fixture</title>
  </head>
  <body>
    <main data-page-kind="search">
      <article data-shopflow-search-item>
        <a data-shopflow-search-url href="https://www.amazon.com/dp/coffee-1">
          <span data-shopflow-search-title>Single Origin Coffee Beans</span>
        </a>
        <span data-shopflow-search-price>$18.50</span>
      </article>
      <article data-shopflow-search-item>
        <a data-shopflow-search-url href="https://www.amazon.com/dp/coffee-2">
          <span data-shopflow-search-title>Espresso Roast</span>
        </a>
        <span data-shopflow-search-price>$22.00</span>
      </article>
    </main>
  </body>
</html>
