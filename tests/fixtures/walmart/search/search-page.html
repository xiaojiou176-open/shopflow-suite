<!doctype html>
<html lang="en">
  <head>
    <title>Walmart Search Fixture</title>
  </head>
  <body>
    <main data-page-kind="search">
      <article data-shopflow-search-item>
        <a
          data-shopflow-search-url
          href="https://www.walmart.com/ip/shopflow-family-coffee"
        >
          <span data-shopflow-search-title>Walmart Family Coffee Pack</span>
        </a>
        <span data-shopflow-search-price>$12.88</span>
      </article>
      <article data-shopflow-search-item>
        <a
          data-shopflow-search-url
          href="https://www.walmart.com/ip/shopflow-weekday-roast"
        >
          <span data-shopflow-search-title>Weekday Roast Beans</span>
        </a>
        <span data-shopflow-search-price>$9.96</span>
      </article>
    </main>
  </body>
</html>
