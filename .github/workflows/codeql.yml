name: codeql

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    runs-on: ubuntu-latest
    steps:
      - name: Explain skipped CodeQL when the platform gate is closed
        if: ${{ github.event.repository.private && vars.SHOPFLOW_ENABLE_CODE_SCANNING != 'true' }}
        run: |
          {
            echo "## CodeQL capability gap"
            echo
            echo "CodeQL is currently skipped because this repository is private and \`SHOPFLOW_ENABLE_CODE_SCANNING\` is not enabled."
            echo "Turn that variable on only after the repository platform supports truthful green runs for private-repo code scanning."
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ !github.event.repository.private || vars.SHOPFLOW_ENABLE_CODE_SCANNING == 'true' }}
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        if: ${{ !github.event.repository.private || vars.SHOPFLOW_ENABLE_CODE_SCANNING == 'true' }}
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        if: ${{ !github.event.repository.private || vars.SHOPFLOW_ENABLE_CODE_SCANNING == 'true' }}
      - uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        if: ${{ !github.event.repository.private || vars.SHOPFLOW_ENABLE_CODE_SCANNING == 'true' }}
        with:
          category: /language:javascript-typescript
