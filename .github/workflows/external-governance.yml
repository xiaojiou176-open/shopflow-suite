name: external-governance

on:
  schedule:
    - cron: '17 09 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  external-governance:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: read
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 10.22.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: Verify public front door truth guards
        run: pnpm exec vitest run tests/integration/public-manifest.front-door.test.ts tests/integration/public-front-door.live.test.ts tests/integration/builder-discoverability-docs.test.ts
      - run: pnpm verify:external-governance
