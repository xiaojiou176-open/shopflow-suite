name: external-governance

on:
  schedule:
    - cron: '17 09 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  external-governance:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: read
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          version: 10.22.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: Verify public front door truth guards
        run: pnpm exec vitest run tests/integration/public-manifest.front-door.test.ts tests/integration/public-front-door.live.test.ts tests/integration/builder-discoverability-docs.test.ts
      - run: pnpm verify:external-governance
