name: workflow-actionlint

on:
  push:
    branches:
      - main
      - master
      - codex/**
  pull_request:

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install actionlint
        run: |
          set -euo pipefail
          version="1.7.12"
          url="https://github.com/rhysd/actionlint/releases/download/v${version}/actionlint_${version}_linux_amd64.tar.gz"
          tmpdir="$(mktemp -d)"
          archive="${tmpdir}/actionlint.tar.gz"

          cleanup() {
            rm -rf "${tmpdir}"
          }
          trap cleanup EXIT

          for attempt in 1 2 3; do
            curl -fsSL --retry 3 --retry-all-errors -o "${archive}" "${url}"
            if tar -tzf "${archive}" actionlint >/dev/null 2>&1; then
              break
            fi

            echo "Downloaded actionlint asset is not a valid gzip archive (attempt ${attempt})." >&2
            if [ "${attempt}" -eq 3 ]; then
              echo "Unable to fetch a valid actionlint release asset from ${url}." >&2
              exit 1
            fi
            sleep $((attempt * 2))
          done

          tar -xzf "${archive}" -C "${tmpdir}" actionlint
          sudo install "${tmpdir}/actionlint" /usr/local/bin/actionlint
      - name: Run actionlint
        run: actionlint -color
